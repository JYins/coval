retrieval_mode: dense
top_k: 3
model_name: paraphrase-multilingual-MiniLM-L12-v2
vector_backend: memory

chunking:
  strategy: sentence
  max_sentences: 2
  chunk_size: 120
  overlap: 20

vector_store:
  collection_name: conversation_chunks
  url: http://localhost:6333

llm:
  provider: mock
  model: mock-relationship-v1

