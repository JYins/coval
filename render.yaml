services:
  - type: web
    name: coval-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements-hosted.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: hosted
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: VECTOR_BACKEND
        value: qdrant
      - key: EMBEDDING_PROVIDER
        value: mock
      - key: LLM_PROVIDER
        value: mock
